<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NITH Result Scraper</title>

<style>

body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#1f4037,#99f2c8);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:850px;
    padding:40px;
    border-radius:20px;
    background:rgba(255,255,255,0.15);
    backdrop-filter: blur(15px);
    box-shadow:0 20px 40px rgba(0,0,0,0.25);
}

h1{
    text-align:center;
    color:white;
    margin-bottom:30px;
}

.form{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:20px;
    margin-bottom:30px;
}

input{
    padding:14px;
    border-radius:10px;
    border:none;
    outline:none;
    font-size:15px;
}

button{
    grid-column:1/4;
    padding:14px;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
    background:#0f2027;
    color:white;
    transition:0.3s;
}

button:hover{
    background:#203a43;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
    background:white;
    border-radius:10px;
    overflow:hidden;
}

th{
    background:#0f2027;
    color:white;
    padding:12px;
}

td{
    padding:10px;
    text-align:center;
}

tr:nth-child(even){
    background:#f4f4f4;
}

.download{
    margin-top:20px;
    background:#2c7be5;
}

.download:hover{
    background:#1a5fc4;
}

.footer{
    text-align:center;
    margin-top:15px;
    color:white;
    font-size:14px;
}

</style>
</head>


<body>

<div class="container">

<h1>NITH Result Scraper</h1>

<div class="form">

<input id="branch" placeholder="Branch shorthand (e.g. BEC)">
<input id="start" type="number" placeholder="Starting Roll No">
<input id="end" type="number" placeholder="Ending Roll No">

<button onclick="startScraping()">Run Scraper</button>

</div>


<table id="resultTable">
<thead>
<tr>
<th>ROLL NUMBER</th>
<th>NAME</th>
<th>CG</th>
</tr>
</thead>

<tbody>
</tbody>
</table>

<button class="download" onclick="downloadCSV()">Download CSV</button>

<div class="footer">
Made for NITH Result Automation
</div>

</div>



<script>

function startScraping(){

let table=document.querySelector("#resultTable tbody")

table.innerHTML=""

let sample=[
["25BEC001","Rahul Sharma",8.2],
["25BEC002","Ankit Verma",7.9],
["25BEC003","Priya Singh",9.1]
]

sample.forEach(row=>{
let tr=document.createElement("tr")

row.forEach(cell=>{
let td=document.createElement("td")
td.innerText=cell
tr.appendChild(td)
})

table.appendChild(tr)
})

}


function downloadCSV(){

let rows=document.querySelectorAll("table tr")

let csv=[]

rows.forEach(row=>{
let cols=row.querySelectorAll("td,th")
let rowData=[]
cols.forEach(col=>rowData.push(col.innerText))
csv.push(rowData.join(","))
})

let blob=new Blob([csv.join("\n")],{type:"text/csv"})
let url=window.URL.createObjectURL(blob)

let a=document.createElement("a")
a.href=url
a.download="result.csv"
a.click()

}

</script>

</body>
</html>
